{% extends "base.html" %}
{% block title %}Add Product - MaaGrocery{% endblock %}

{% block content %}
<section class="form-page">
    <div class="section-heading">
        <span class="eyebrow">Inventory</span>
        <h1>Add product</h1>
    </div>
    <form class="product-form" method="post" enctype="multipart/form-data">
        <div class="form-grid">
            <label>Product name
                <input type="text" name="name" required>
            </label>
            <label>Category
                <select name="category_id" required>
                    {% for category in categories %}
                        <option value="{{ category.id }}">{{ category.name }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>Price
                <input type="number" name="price" step="0.01" min="0" required>
            </label>
            <label>Discount price
                <input type="number" name="discount_price" step="0.01" min="0">
            </label>
            <label>Stock
                <input type="number" name="stock" min="0" required>
            </label>
            <label>Unit
                <input type="text" name="unit" value="1 kg" required>
            </label>
            <label class="span-2">Image URL
                <input type="url" name="image_url" placeholder="https://...">
            </label>
            <label class="span-2">Upload image
                <input type="file" name="image_file" accept="image/png,image/jpeg,image/webp,image/gif">
            </label>
            <label class="span-2">Description
                <textarea name="description" rows="5" required></textarea>
            </label>
            <label class="checkbox-line">
                <input type="checkbox" name="is_best_seller">
                <span>Mark as best seller</span>
            </label>
        </div>
        <div class="form-actions">
            <button class="btn btn-primary" type="submit"><i class="fa-solid fa-plus"></i> Add product</button>
            <a class="btn btn-soft" href="{{ url_for('admin_dashboard') }}"><i class="fa-solid fa-arrow-left"></i> Back</a>
        </div>
    </form>
</section>
{% endblock %}
