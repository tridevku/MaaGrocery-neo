{% extends "base.html" %}
{% block title %}Admin Login - MaaGrocery{% endblock %}

{% block content %}
<section class="auth-wrap">
    <form class="auth-card" method="post">
        <span class="brand-mark auth-mark"><i class="fa-solid fa-user-shield"></i></span>
        <h1>Admin login</h1>
        <label>Username
            <input type="text" name="username" value="admin" required>
        </label>
        <label>Password
            <input type="password" name="password" value="admin123" required>
        </label>
        <button class="btn btn-primary full-btn" type="submit"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
    </form>
</section>
{% endblock %}
